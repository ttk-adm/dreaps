name: Rust CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        toolchain: [stable]

    steps:
      - uses: actions/checkout@v4

      # - uses: Swatinem/rust-cache@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check Format
        run: cargo fmt -- --check

      # - name: Lint
      #   run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test --all --verbose